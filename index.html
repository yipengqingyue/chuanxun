<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>塔罗传讯</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Georgia', serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; }
        .app { width: 480px; max-width: 100vw; height: 100vh; max-height: 100vh; background: #16213e; display: flex; flex-direction: column; overflow: hidden; border-radius: 24px; position: relative; }
        @media (max-width: 500px) { .app { border-radius: 0; } }
        .hidden { display: none !important; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #c9a96e; color: #1a1a2e; padding: 10px 20px; border-radius: 50px; z-index: 9999; font-size: 0.85em; letter-spacing: 2px; animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards; pointer-events: none; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        #startScreen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; text-align: center; padding: 40px; }
        #startScreen .star { font-size: 80px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
        #startScreen h1 { font-size: 2em; color: #c9a96e; letter-spacing: 6px; }
        #startScreen p { color: rgba(224,213,193,0.6); letter-spacing: 3px; }
        #startScreen button { padding: 16px 30px; border-radius: 50px; font-family: inherit; font-size: 1em; letter-spacing: 3px; cursor: pointer; background: transparent; margin: 8px; width: 250px; transition: 0.3s; }
        .btn1 { border: 1px solid #c9a96e; color: #c9a96e; }
        .btn1:hover { background: rgba(201,169,110,0.15); }
        .btn2 { border: 1px solid #7b68ee; color: #7b68ee; }
        .btn2:hover { background: rgba(123,104,238,0.15); }
        .sync-status { font-size: 0.75em; margin-top: 10px; }

        #chatScreen { flex: 1; display: flex; flex-direction: column; background: #f5f0e8; background-size: cover; background-position: center; overflow: hidden; }
        .chat-header { display: flex; align-items: center; padding: 12px 16px; background: rgba(22,33,62,0.95); gap: 10px; flex-shrink: 0; position: relative; z-index: 20; }
        .chat-header button { background: none; border: none; color: #c9a96e; font-size: 1.5em; cursor: pointer; }
        .chat-header .info { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .chat-header .info img { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #c9a96e; object-fit: cover; cursor: pointer; }
        .chat-header .info span { color: #c9a96e; font-weight: bold; letter-spacing: 2px; cursor: pointer; }
        .chat-header .gear-btn { color: #e0d5c1 !important; font-size: 1.3em !important; opacity: 0.7; }

        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 80; }
        .sidebar { position: fixed; top: 0; right: 0; width: 300px; max-width: 80vw; height: 100%; background: #16213e; z-index: 90; overflow-y: auto; padding: 20px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .sidebar h3 { color: #c9a96e; letter-spacing: 3px; margin-bottom: 16px; font-size: 1.1em; text-align: center; }
        .sidebar .section { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #3a3a5a; }
        .sidebar .section:last-child { border-bottom: none; }
        .sidebar .section h4 { color: #e0d5c1; font-size: 0.85em; letter-spacing: 2px; margin-bottom: 10px; }
        .sidebar button { display: block; width: 100%; padding: 10px 14px; background: none; border: 1px solid #3a3a5a; color: #e0d5c1; font-family: inherit; font-size: 0.85em; letter-spacing: 2px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; text-align: left; transition: 0.2s; }
        .sidebar button:hover { background: rgba(201,169,110,0.15); color: #c9a96e; border-color: #c9a96e; }
        .sidebar button.danger { border-color: #c94a4a; color: #c94a4a; }
        .sidebar button.danger:hover { background: rgba(201,74,74,0.15); }
        .sidebar input { width: 100%; padding: 10px 12px; background: #0f0f1a; border: 1px solid #3a3a5a; border-radius: 8px; color: #e0d5c1; font-family: inherit; font-size: 0.85em; outline: none; margin-bottom: 8px; }
        .sidebar .search-result { max-height: 200px; overflow-y: auto; margin-top: 8px; }
        .sidebar .search-result div { padding: 8px 12px; cursor: pointer; border-radius: 6px; font-size: 0.8em; color: #ccc; border-bottom: 1px solid #2a2a4a; }
        .sidebar .search-result div:hover { background: rgba(201,169,110,0.15); color: #c9a96e; }
        .sidebar .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #e0d5c1; font-size: 1.3em; cursor: pointer; }

        .msg-list { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; gap: 8px; flex-shrink: 0; align-items: flex-start; }
        .msg-row.me { flex-direction: row-reverse; }
        .msg-row .avatar-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
        .msg-row .avatar-col .nick-label { font-size: 0.6em; color: rgba(0,0,0,0.45); max-width: 50px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
        .msg-row .select-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #c9a96e; flex-shrink: 0; cursor: pointer; margin-top: 8px; display: none; align-items: center; justify-content: center; font-size: 12px; color: #c9a96e; background: transparent; transition: 0.2s; }
        .msg-row .select-dot.show { display: flex; }
        .msg-row .select-dot.selected { background: #c9a96e; color: #fff; }
        .msg-row .select-dot.selected::after { content: '✓'; }
        .msg-row img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #3a3a5a; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        .msg-row.me img { border-color: #4a7a5e; }
        .msg-row.bot img { border-color: #c9a96e; }
        .bubble-wrap { display: flex; flex-direction: column; max-width: 70%; }
        .msg-row.me .bubble-wrap { align-items: flex-end; }
        .bubble { padding: 10px 14px; border-radius: 16px; font-size: 0.9em; line-height: 1.5; word-break: break-word; position: relative; display: inline-block; }
        .msg-row.me .bubble { background: #e8a87c; color: #fff; border-bottom-right-radius: 4px; }
        .msg-row.bot .bubble { background: #d6eaf8; color: #1a2a3a; border-bottom-left-radius: 4px; }
        .bubble .tag { position: absolute; font-size: 12px; }
        .msg-row.me .tag { top: -10px; right: -4px; width: 14px; height: 14px; }
        .msg-row.bot .tag { top: -10px; left: -4px; }
        .msg-time { font-size: 0.65em; color: rgba(0,0,0,0.35); margin-top: 2px; padding: 0 4px; }

        .jasmine { position: relative; display: inline-block; width: 14px; height: 14px; }
        .jasmine .petal { position: absolute; width: 5px; height: 8px; background: white; border-radius: 50%; top: 50%; left: 50%; }
        .jasmine .petal:nth-child(1) { transform: translate(-50%,-50%) rotate(0deg) translateY(-4px); }
        .jasmine .petal:nth-child(2) { transform: translate(-50%,-50%) rotate(72deg) translateY(-4px); }
        .jasmine .petal:nth-child(3) { transform: translate(-50%,-50%) rotate(144deg) translateY(-4px); }
        .jasmine .petal:nth-child(4) { transform: translate(-50%,-50%) rotate(216deg) translateY(-4px); }
        .jasmine .petal:nth-child(5) { transform: translate(-50%,-50%) rotate(288deg) translateY(-4px); }
        .jasmine .center { position: absolute; width: 4px; height: 4px; background: #f5d742; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); }

        .input-area { display: flex; gap: 8px; padding: 10px 14px; background: rgba(22,33,62,0.95); flex-shrink: 0; }
        .input-area textarea { flex: 1; resize: none; background: rgba(15,15,26,0.8); border: 1px solid #3a3a5a; border-radius: 18px; padding: 10px 14px; color: #e0d5c1; font-family: inherit; font-size: 0.9em; outline: none; max-height: 80px; min-height: 40px; line-height: 1.4; }
        .input-area textarea:focus { border-color: #c9a96e; }
        .input-area .send-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #c9a96e; color: #1a1a2e; font-size: 1.1em; cursor: pointer; flex-shrink: 0; }
        .input-area .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .delete-bar { display: none; gap: 8px; padding: 10px 14px; background: rgba(22,33,62,0.95); flex-shrink: 0; border-top: 1px solid #3a3a5a; }
        .delete-bar.show { display: flex; }
        .delete-bar button { flex: 1; padding: 10px; border-radius: 50px; font-family: inherit; font-size: 0.85em; letter-spacing: 2px; cursor: pointer; }
        .delete-bar .confirm-del { background: #c94a4a; color: #fff; border: none; }
        .delete-bar .cancel-del { background: transparent; border: 1px solid #3a3a5a; color: #e0d5c1; }

        #oracleScreen { flex: 1; display: flex; flex-direction: column; background: #0f0f1a; overflow: hidden; }
        .oracle-header { display: flex; align-items: center; justify-content: center; padding: 18px; background: #16213e; color: #c9a96e; letter-spacing: 4px; position: relative; flex-shrink: 0; }
        .oracle-header button { position: absolute; left: 12px; background: none; border: none; color: #c9a96e; font-size: 1.5em; cursor: pointer; }
        .ora-list { flex: 1; min-height: 0; overflow-y: auto; padding: 24px 18px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .ora-card { background: #16213e; border: 1px solid #3a3a5a; border-radius: 14px; padding: 18px 22px; width: 100%; max-width: 400px; text-align: center; letter-spacing: 2px; line-height: 1.8; }

        #letterScreen { flex: 1; display: flex; flex-direction: column; background: #e8f5e9; background-size: cover; background-position: center; overflow: hidden; }
        .letter-header { display: flex; align-items: center; justify-content: center; padding: 14px; background: rgba(22,33,62,0.95); color: #c9a96e; letter-spacing: 3px; position: relative; flex-shrink: 0; }
        .letter-header button { position: absolute; left: 12px; background: none; border: none; color: #c9a96e; font-size: 1.5em; cursor: pointer; }
        .letter-header .lgear { position: absolute; right: 12px; left: auto; color: #e0d5c1; font-size: 1.3em; opacity: 0.7; cursor: pointer; background: none; border: none; }
        .let-tabs { display: flex; background: rgba(255,255,255,0.5); flex-shrink: 0; }
        .let-tabs button { flex: 1; padding: 12px; cursor: pointer; border: none; border-bottom: 2px solid transparent; color: rgba(0,0,0,0.5); font-family: inherit; font-size: 0.9em; background: none; }
        .let-tabs button.on { color: #c9a96e; border-bottom-color: #c9a96e; }
        .write-panel { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
        .write-panel textarea { flex: 1; min-height: 0; background: transparent; border: none; padding: 20px; color: #2a2a2a; font-family: inherit; font-size: 0.9em; line-height: 1.7; resize: none; outline: none; }
        .write-panel .lbtn { margin: 12px 20px; padding: 12px; border: 1px solid #c9a96e; background: transparent; color: #c9a96e; font-family: inherit; letter-spacing: 3px; cursor: pointer; border-radius: 50px; flex-shrink: 0; }
        .write-panel .lbtn:disabled { opacity: 0.4; cursor: not-allowed; }
        .reply-panel { flex: 1; min-height: 0; overflow-y: auto; padding: 20px; color: #2a2a2a; font-size: 0.9em; line-height: 1.8; }

        .modal-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #16213e; border-radius: 18px; padding: 22px; width: 90%; max-width: 380px; text-align: center; }
        .modal-box h3 { color: #c9a96e; margin-bottom: 14px; }
        .modal-box input { width: 100%; padding: 10px; background: #0f0f1a; border: 1px solid #3a3a5a; border-radius: 10px; color: #e0d5c1; font-family: inherit; font-size: 0.9em; outline: none; margin-bottom: 14px; }
        .modal-box .acts { display: flex; gap: 10px; justify-content: center; }
        .modal-box .acts button { padding: 10px 22px; border-radius: 50px; cursor: pointer; font-family: inherit; }
        .modal-box .acts .ok { background: #c9a96e; color: #1a1a2e; border: none; }
        .modal-box .acts .no { background: transparent; border: 1px solid #3a3a5a; color: #e0d5c1; }

        .crop-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 200; display: flex; flex-direction: column; }
        .crop-area { flex: 1; position: relative; overflow: hidden; cursor: grab; }
        .crop-area img { position: absolute; top: 0; left: 0; transform-origin: 0 0; max-width: none; max-height: none; }
        .crop-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 0 9999px rgba(0,0,0,0.55); border: 2px dashed rgba(255,255,255,0.5); z-index: 10; pointer-events: none; }
        .crop-bar { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 14px; background: rgba(0,0,0,0.85); flex-shrink: 0; }
        .crop-bar button { padding: 10px 24px; border-radius: 50px; cursor: pointer; font-family: inherit; border: none; }
        .crop-bar .ok { background: #c9a96e; color: #1a1a2e; }
        .crop-bar .no { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
        .crop-bar input[type=range] { width: 100px; accent-color: #c9a96e; }
    </style>
</head>
<body>

<div class="app">
    <div id="startScreen">
        <div class="star">✦</div>
        <h1>塔 罗 传 讯</h1>
        <p>命运的信使 · 为你而来</p>
        <button class="btn1" id="btnChat">💬 聊 天</button>
        <button class="btn2" id="btnOracle">🔮 今日传讯</button>
        <button class="btn1" id="btnLetter">✉️ 书 信</button>
        <div class="sync-status" id="syncStatus"></div>
    </div>

    <div id="chatScreen" class="hidden">
        <div class="chat-header">
            <button id="chatBack">←</button>
            <div class="info">
                <img id="botAv" src="data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' fill='%232a2a4a'/%3E%3Ctext x='50' y='50' text-anchor='middle' dy='.35em' font-size='50' fill='%23c9a96e'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">
                <span id="botName">塔罗信使</span>
            </div>
            <button class="gear-btn" id="chatGear">⚙</button>
        </div>
        <div class="msg-list" id="msgList"></div>
        <div class="delete-bar" id="deleteBar">
            <button class="cancel-del" id="cancelDelete">取消</button>
            <button class="confirm-del" id="confirmDeleteBtn">确认删除</button>
        </div>
        <div class="input-area" id="inputArea">
            <textarea id="msgInput" rows="1" placeholder="写下你想说的话..."></textarea>
            <button class="send-btn" id="msgSend">↑</button>
        </div>
    </div>

    <div id="oracleScreen" class="hidden">
        <div class="oracle-header"><button id="oracleBack">←</button>🔮 今日传讯</div>
        <div class="ora-list" id="oraList"></div>
        <div style="text-align:center;padding:12px;flex-shrink:0;">
            <button id="oraRefresh" style="padding:10px 22px;border:1px solid #c9a96e;background:transparent;color:#c9a96e;font-family:inherit;cursor:pointer;border-radius:50px;">🔄 重新抽取</button>
        </div>
    </div>

    <div id="letterScreen" class="hidden">
        <div class="letter-header">
            <button id="letterBack">←</button>✉️ 书信
            <button class="lgear" id="letterGear">⚙</button>
            <div id="letterMenu" class="dropdown hidden" style="right:10px;">
                <button id="menuLetterBg">更换书信背景</button>
                <button id="menuResetLetterBg">恢复书信默认背景</button>
            </div>
        </div>
        <div class="let-tabs">
            <button class="on" id="tabWrite">📝 写 信</button>
            <button id="tabReply">📬 回 信</button>
        </div>
        <div class="write-panel" id="writePanel">
            <textarea id="letterInput" placeholder="写下你想说的话..."></textarea>
            <button class="lbtn" id="letterSend">📮 寄出信件</button>
        </div>
        <div class="reply-panel hidden" id="replyPanel"></div>
    </div>

    <div id="sidebarOverlay" class="sidebar-overlay hidden" onclick="closeSidebar()"></div>
    <div id="sidebar" class="sidebar hidden">
        <button class="close-btn" onclick="closeSidebar()">✕</button>
        <h3>⚙ 设置</h3>
        <div class="section">
            <h4>📝 个人设置</h4>
            <button onclick="changeNick('me');closeSidebar();">修改我的昵称</button>
            <button onclick="triggerCrop('myAvatar');closeSidebar();">更换我的头像</button>
            <button onclick="triggerCrop('botAvatar');closeSidebar();">更换对方头像</button>
            <button onclick="changeNick('bot');closeSidebar();">修改对方昵称</button>
            <button onclick="triggerCrop('chatBg');closeSidebar();">更换聊天背景</button>
            <button onclick="resetChatBg()">恢复聊天默认背景</button>
        </div>
        <div class="section">
            <h4>🔍 查找记录</h4>
            <input type="text" id="searchInput" placeholder="输入关键词搜索...">
            <button onclick="searchMessages()">搜索</button>
            <div class="search-result" id="searchResult"></div>
        </div>
        <div class="section">
            <h4>🗑 删除记录</h4>
            <button onclick="enterDeleteMode()">选择并删除消息</button>
        </div>
    </div>
</div>

<div id="nickModal" class="modal-over hidden">
    <div class="modal-box">
        <h3 id="nickTitle">修改昵称</h3>
        <input id="nickInput" maxlength="12" placeholder="输入新昵称...">
        <div class="acts">
            <button class="no" id="nickCancel">取消</button>
            <button class="ok" id="nickOk">确定</button>
        </div>
    </div>
</div>

<div id="cropModal" class="crop-over hidden">
    <div class="crop-area" id="cropArea">
        <img id="cropImg" src="" draggable="false">
        <div class="crop-ring" id="cropRing"></div>
    </div>
    <div class="crop-bar">
        <button class="no" id="cropCancel">取消</button>
        <input type="range" id="cropSlider" min="0.1" max="5" step="0.01" value="1">
        <button class="ok" id="cropOk">确定</button>
    </div>
</div>

<input type="file" id="filePicker" accept="image/*" style="display:none">

<script>
var SUPABASE_URL='https://omaiiaeolvyefvoetqty.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tYWlpYWVvbHZ5ZWZ2b2V0cXR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTk3NDUsImV4cCI6MjA5OTc3NTc0NX0.27MKF5VHWL3fn1fGvxLXpUtI9MTJMj3-5NLRpm3FJqY';
var uid='';var p=new URLSearchParams(window.location.search);uid=p.get('uid')||'';if(!uid){try{uid=localStorage.getItem('tarot_uid');}catch(e){}if(!uid){uid='u'+Date.now();}}try{localStorage.setItem('tarot_uid',uid);}catch(e){}
var deleteMode=false,selectedIndices={};

function getAllMsgs(){var a=[];for(var k in TAROT){var arr=TAROT[k];for(var i=0;i<arr.length;i++){a.push({text:arr[i],card:k});}}return a;}
function shuffle(a){var t=[];for(var i=0;i<a.length;i++)t.push(a[i]);for(var i=t.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=t[i];t[i]=t[j];t[j]=tmp;}return t;}

function openSidebar(){document.getElementById('sidebar').classList.remove('hidden');document.getElementById('sidebarOverlay').classList.remove('hidden');}

function toggleSelect(index){if(!deleteMode)return;if(selectedIndices[index]){delete selectedIndices[index];}else{selectedIndices[index]=true;}renderHistory();}
function confirmDeleteMsg(){var keys=Object.keys(selectedIndices);if(keys.length===0){toast('请至少选择一条消息');return;}var indices=keys.map(Number).sort(function(a,b){return b-a;});for(var i=0;i<indices.length;i++){S.chatHistory.splice(indices[i],1);}exitDeleteMode();saveData();toast('✅ 已删除 '+indices.length+' 条消息');}

function scrollToBottom(){var ml=document.getElementById('msgList');if(ml&&ml.lastChild){ml.scrollTop=ml.scrollHeight;}}

function showPage(n){
    document.getElementById('startScreen').classList.add('hidden');document.getElementById('chatScreen').classList.add('hidden');document.getElementById('oracleScreen').classList.add('hidden');document.getElementById('letterScreen').classList.add('hidden');
    if(n==='start')document.getElementById('startScreen').classList.remove('hidden');
    else if(n==='chat'){document.getElementById('chatScreen').classList.remove('hidden');document.getElementById('botName').textContent=S.botName;if(S.botAvatar)document.getElementById('botAv').src=S.botAvatar;document.getElementById('chatScreen').style.backgroundImage=S.chatBg?'url('+S.chatBg+')':'';exitDeleteMode();renderHistory();}
    else if(n==='oracle'){document.getElementById('oracleScreen').classList.remove('hidden');if(!S.oracle.length)refreshOracle();renderOracle();}
    else if(n==='letter'){document.getElementById('letterScreen').classList.remove('hidden');updateLetterUI();}
}
function renderHistory(){var ml=document.getElementById('msgList');ml.innerHTML='';var d=document.createElement('div');d.style.cssText='text-align:center;font-size:0.75em;color:rgba(0,0,0,0.35);padding:6px 0;';d.textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});ml.appendChild(d);for(var i=0;i<S.chatHistory.length;i++){var m=S.chatHistory[i];addBubble(m.who,m.text,m.color,m.time,i);}scrollToBottom();}
function addBubble(who,text,color,time,index){
    var isDelete=deleteMode;var ml=document.getElementById('msgList');var row=document.createElement('div');row.className='msg-row '+(who==='me'?'me':'bot');
    var dot=document.createElement('div');dot.className='select-dot';if(isDelete)dot.classList.add('show');if(index!==undefined&&selectedIndices[index])dot.classList.add('selected');
    if(isDelete&&index!==undefined){(function(idx){dot.onclick=function(e){e.stopPropagation();toggleSelect(idx);};})(index);}
    var avCol=document.createElement('div');avCol.className='avatar-col';
    var av=document.createElement('img');av.src=avatarFor(who);av.onclick=function(){if(!isDelete)triggerCrop(who==='me'?'myAvatar':'botAvatar');};
    avCol.appendChild(av);
    var nick=document.createElement('div');nick.className='nick-label';nick.textContent=who==='me'?S.myName:S.botName;avCol.appendChild(nick);
    var wrap=document.createElement('div');wrap.className='bubble-wrap';var bub=document.createElement('div');bub.className='bubble';bub.textContent=text;
    var tag=document.createElement('span');tag.className='tag';if(who==='me'){tag.innerHTML='<div class="jasmine"><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="center"></div></div>';}else{tag.textContent='❄️';}bub.appendChild(tag);
    if(who==='me')bub.style.backgroundColor=color||rc();wrap.appendChild(bub);
    var tm=document.createElement('div');tm.className='msg-time';tm.textContent=time?getTimeFromStamp(time):getTime();wrap.appendChild(tm);
    row.appendChild(dot);row.appendChild(avCol);row.appendChild(wrap);ml.appendChild(row);
}
function getTimeFromStamp(ts){var d=new Date(ts);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function sendMsg(){if(S.typing||deleteMode)return;var text=document.getElementById('msgInput').value.trim();if(!text)return;document.getElementById('msgInput').value='';document.getElementById('msgInput').style.height='auto';document.getElementById('msgSend').disabled=true;var color=rc();var now=Date.now();S.chatHistory.push({who:'me',text:text,time:now,color:color});addBubble('me',text,color,now);scrollToBottom();saveData();S.typing=true;var tr=document.createElement('div');tr.className='msg-row bot';tr.id='typing';tr.innerHTML='<div class="avatar-col"><img src="'+avatarFor('bot')+'"><div class="nick-label">'+S.botName+'</div></div><div class="bubble-wrap"><div class="bubble" style="font-style:italic;opacity:0.7;background:#d6eaf8;color:#1a2a3a;">...<span class="tag">❄️</span></div></div>';document.getElementById('msgList').appendChild(tr);scrollToBottom();var n=Math.floor(Math.random()*3)+1,all=getAllMsgs(),avail=[];for(var i=0;i<all.length;i++){if(S.used.indexOf(i)===-1)avail.push(all[i]);}if(avail.length<n){S.used=[];for(var i=0;i<all.length;i++)avail.push(all[i]);}var picked=shuffle(avail).slice(0,n);for(var i=0;i<picked.length;i++){var idx=all.indexOf(picked[i]);if(idx>=0&&S.used.indexOf(idx)===-1)S.used.push(idx);}setTimeout(function(){var t=document.getElementById('typing');if(t)t.remove();for(var i=0;i<picked.length;i++){(function(msg,idx){setTimeout(function(){var txt=msg.text;if(Math.random()<0.35)txt+=', '+S.myName;var now2=Date.now();S.chatHistory.push({who:'bot',text:txt,time:now2});addBubble('bot',txt,null,now2);scrollToBottom();saveData();playBeep();if(idx===picked.length-1){S.typing=false;document.getElementById('msgSend').disabled=false;document.getElementById('msgInput').focus();}},idx*1000);})(picked[i],i);}if(!picked.length){S.typing=false;document.getElementById('msgSend').disabled=false;}},Math.floor(Math.random()*3000)+1000);}
function playBeep(){try{var ac=new AudioContext();var o=ac.createOscillator();var g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=800;g.gain.value=0.06;o.start();g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.08);o.stop(ac.currentTime+0.08);}catch(e){}}

function updateLetterUI(){if(document.getElementById('writePanel').classList.contains('hidden')){if(S.replyTime&&S.replyTime>Date.now()){var m=Math.ceil((S.replyTime-Date.now())/60000);var ts=m<60?m+'分钟':Math.floor(m/60)+'小时'+m%60+'分钟';document.getElementById('replyPanel').innerHTML='<div style="text-align:center;color:rgba(0,0,0,0.5);padding:40px;">📬 信件已寄出<br><br>预计 '+ts+' 后回复</div>';}else if(!S.replies||!S.replies.length){document.getElementById('replyPanel').innerHTML='<div style="text-align:center;color:rgba(0,0,0,0.4);padding:40px;">还没有收到回信<br>先去写信吧 ✍️</div>';}else{var h='';for(var i=0;i<S.replies.length;i++){h+='<div style="padding:5px 0;border-bottom:1px dotted rgba(0,0,0,0.07);">'+S.replies[i].text+'</div>';}document.getElementById('replyPanel').innerHTML=h;}}else{document.getElementById('letterInput').value=S.letterText||'';document.getElementById('letterSend').disabled=!!(S.replyTime&&S.replyTime>Date.now());document.getElementById('letterSend').textContent=S.replyTime&&S.replyTime>Date.now()?'⏳ 等待回信中...':'📮 寄出信件';}}
function submitLetter(){var t=document.getElementById('letterInput').value.trim();if(!t||(S.replyTime&&S.replyTime>Date.now()))return;S.letterText=t;S.replies=[];S.replyTime=null;var d=Math.floor(Math.random()*(10800000-600000+1))+600000;S.replyTime=Date.now()+d;S.replyTimer=setTimeout(function(){S.replies=shuffle(getAllMsgs()).slice(0,Math.max(5,Math.floor(Math.random()*3)+5)).map(function(m){return{text:m.text};});S.replyTime=null;saveData();updateLetterUI();},d);saveData();document.getElementById('letterInput').value='';S.letterText='';switchLetterTab('reply');}
function searchMessages(){var kw=document.getElementById('searchInput').value.trim().toLowerCase();var result=document.getElementById('searchResult');result.innerHTML='';if(!kw){result.innerHTML='<div style="color:#888;">请输入关键词</div>';return;}var found=[];for(var i=0;i<S.chatHistory.length;i++){if(S.chatHistory[i].text.toLowerCase().indexOf(kw)!==-1){found.push({index:i,text:S.chatHistory[i].text.substring(0,30)+(S.chatHistory[i].text.length>30?'...':''),who:S.chatHistory[i].who});}}if(found.length===0){result.innerHTML='<div style="color:#888;">未找到匹配记录</div>';return;}for(var j=0;j<found.length;j++){(function(f){var div=document.createElement('div');div.textContent=(f.who==='me'?'我':'对方')+': '+f.text;div.onclick=function(){closeSidebar();jumpToMessage(f.index);};result.appendChild(div);})(found[j]);}}

document.getElementById('nickModal').onclick=function(e){if(e.target===document.getElementById('nickModal'))document.getElementById('nickModal').classList.add('hidden');};

document.getElementById('filePicker').onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){S.cropScale=1;S.cropX=0;S.cropY=0;showCrop(ev.target.result);};r.readAsDataURL(f);e.target.value='';};
function showCrop(src){var img=document.getElementById('cropImg');img.src=src;img.onload=function(){S.cropNW=img.naturalWidth;S.cropNH=img.naturalHeight;var a=document.getElementById('cropArea'),aw=a.clientWidth,ah=a.clientHeight;S.cropScale=Math.max(aw/S.cropNW,ah/S.cropNH)*0.8;S.cropX=(aw-S.cropNW*S.cropScale)/2;S.cropY=(ah-S.cropNH*S.cropScale)/2;document.getElementById('cropSlider').value=S.cropScale;applyCrop();};img.style.transformOrigin='0 0';document.getElementById('cropSlider').value=1;document.getElementById('cropModal').classList.remove('hidden');updateCropRing();}
function updateCropRing(){var a=document.getElementById('cropArea'),aw=a.clientWidth,ah=a.clientHeight,bg=S.cropWhat==='chatBg'||S.cropWhat==='letterBg',r=document.getElementById('cropRing');r.style.borderRadius=bg?'8px':'50%';r.style.width=(bg?aw*0.85:Math.min(aw,ah)*0.55)+'px';r.style.height=(bg?ah*0.7:Math.min(aw,ah)*0.55)+'px';}
function applyCrop(){document.getElementById('cropImg').style.transform='translate('+S.cropX+'px,'+S.cropY+'px) scale('+S.cropScale+')';}
document.getElementById('cropCancel').onclick=function(){document.getElementById('cropModal').classList.add('hidden');S.cropWhat=null;};
document.getElementById('cropOk').onclick=function(){var img=document.getElementById('cropImg'),ring=document.getElementById('cropRing'),area=document.getElementById('cropArea'),rr=ring.getBoundingClientRect(),ar=area.getBoundingClientRect(),fw=rr.width,fh=rr.height,c=document.createElement('canvas');c.width=fw;c.height=fh;var ctx=c.getContext('2d');ctx.drawImage(img,((rr.left-ar.left)-S.cropX)/S.cropScale,((rr.top-ar.top)-S.cropY)/S.cropScale,fw/S.cropScale,fh/S.cropScale,0,0,fw,fh);var url;if(S.cropWhat==='myAvatar'||S.cropWhat==='botAvatar'){var rc=document.createElement('canvas');rc.width=200;rc.height=200;var rctx=rc.getContext('2d');rctx.beginPath();rctx.arc(100,100,100,0,Math.PI*2);rctx.clip();rctx.drawImage(c,0,0,fw,fh,0,0,200,200);url=rc.toDataURL('image/png');}else{url=c.toDataURL('image/jpeg',0.85);}if(S.cropWhat==='myAvatar')S.myAvatar=url;else if(S.cropWhat==='botAvatar'){S.botAvatar=url;document.getElementById('botAv').src=url;}else if(S.cropWhat==='chatBg'){S.chatBg=url;document.getElementById('chatScreen').style.backgroundImage='url('+url+')';}else if(S.cropWhat==='letterBg'){S.letterBg=url;document.getElementById('letterScreen').style.backgroundImage='url('+url+')';document.getElementById('letterScreen').style.backgroundSize='cover';document.getElementById('letterScreen').style.backgroundPosition='center';}document.getElementById('cropModal').classList.add('hidden');S.cropWhat=null;saveData();toast('✅ 已保存');};
document.getElementById('cropSlider').oninput=function(){S.cropScale=parseFloat(this.value);applyCrop();};
var ca=document.getElementById('cropArea');ca.addEventListener('mousedown',function(e){S.dragging=true;S.dsX=e.clientX;S.dsY=e.clientY;S.dsCX=S.cropX;S.dsCY=S.cropY;e.preventDefault();});ca.addEventListener('touchstart',function(e){if(e.touches.length===1){S.dragging=true;S.dsX=e.touches[0].clientX;S.dsY=e.touches[0].clientY;S.dsCX=S.cropX;S.dsCY=S.cropY;}},{passive:false});ca.addEventListener('wheel',function(e){e.preventDefault();S.cropScale=Math.max(0.1,Math.min(5,S.cropScale+(e.deltaY>0?-0.03:0.03)));document.getElementById('cropSlider').value=S.cropScale;applyCrop();},{passive:false});document.addEventListener('mousemove',function(e){if(!S.dragging)return;S.cropX=S.dsCX+(e.clientX-S.dsX);S.cropY=S.dsCY+(e.clientY-S.dsY);applyCrop();});document.addEventListener('mouseup',function(){S.dragging=false;});document.addEventListener('touchmove',function(e){if(!S.dragging)return;S.cropX=S.dsCX+(e.touches[0].clientX-S.dsX);S.cropY=S.dsCY+(e.touches[0].clientY-S.dsY);applyCrop();});document.addEventListener('touchend',function(){S.dragging=false;});
document.addEventListener('click',function(e){if(!e.target.closest('.sidebar')&&!e.target.closest('#chatGear')){if(!document.getElementById('sidebar').classList.contains('hidden')){closeSidebar();}}});

cloudLoad(function(data){if(data){if(data.chatHistory)S.chatHistory=data.chatHistory;if(data.chatBg)S.chatBg=data.chatBg;if(data.myName)S.myName=data.myName;if(data.botName)S.botName=data.botName;if(data.myAvatar)S.myAvatar=data.myAvatar;if(data.botAvatar)S.botAvatar=data.botAvatar;if(data.letterBg)S.letterBg=data.letterBg;if(data.oracle)S.oracle=data.oracle;if(data.replies)S.replies=data.replies;if(data.letterText!=null)S.letterText=data.letterText;if(data.replyTime!=null)S.replyTime=data.replyTime;}if(S.botAvatar)document.getElementById('botAv').src=S.botAvatar;document.getElementById('botName').textContent=S.botName;if(S.chatBg)document.getElementById('chatScreen').style.backgroundImage='url('+S.chatBg+')';if(S.letterBg){document.getElementById('letterScreen').style.backgroundImage='url('+S.letterBg+')';document.getElementById('letterScreen').style.backgroundSize='cover';document.getElementById('letterScreen').style.backgroundPosition='center';}if(S.replyTime&&S.replyTime>Date.now()){setTimeout(function(){S.replies=shuffle(getAllMsgs()).slice(0,Math.max(5,Math.floor(Math.random()*3)+5)).map(function(m){return{text:m.text};});S.replyTime=null;saveData();updateLetterUI();},S.replyTime-Date.now());}document.getElementById('syncStatus').textContent=S.chatHistory.length>0?'✅ 已加载 '+S.chatHistory.length+' 条记录':'✅ 已连接云端';document.getElementById('syncStatus').style.color='#4a9e4a';showPage('start');});
</script>
</body>
</html>
