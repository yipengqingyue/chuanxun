<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔罗传讯</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app { width: 480px; max-width: 100vw; height: 100vh; max-height: 850px; background: #16213e; display: flex; flex-direction: column; overflow: hidden; border-radius: 24px; }
        @media (max-width: 500px) { .app { border-radius: 0; max-height: 100vh; height: 100vh; } }
        .hidden { display: none !important; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #c9a96e; color: #1a1a2e; padding: 10px 20px; border-radius: 50px; z-index: 9999; font-size: 0.85em; letter-spacing: 2px; animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards; pointer-events: none; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        #startScreen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; text-align: center; padding: 40px; }
        #startScreen .star { font-size: 80px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
        #startScreen h1 { font-size: 2em; color: #c9a96e; letter-spacing: 6px; }
        #startScreen p { color: rgba(224,213,193,0.6); letter-spacing: 3px; }
        #startScreen button { padding: 16px 30px; border-radius: 50px; font-family: inherit; font-size: 1em; letter-spacing: 3px; cursor: pointer; background: transparent; margin: 8px; width: 250px; transition: 0.3s; }
        .btn1 { border: 1px solid #c9a96e; color: #c9a96e; }
        .btn1:hover { background: rgba(201,169,110,0.15); }
        .btn2 { border: 1px solid #7b68ee; color: #7b68ee; }
        .btn2:hover { background: rgba(123,104,238,0.15); }
        .sync-status { font-size: 0.75em; margin-top: 10px; }

        #chatScreen { flex: 1; display: flex; flex-direction: column; background: #f5f0e8; background-size: cover; background-position: center; }
        .chat-header { display: flex; align-items: center; padding: 12px 16px; background: rgba(22,33,62,0.95); gap: 10px; flex-shrink: 0; position: relative; }
        .chat-header button { background: none; border: none; color: #c9a96e; font-size: 1.5em; cursor: pointer; }
        .chat-header .info { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .chat-header .info img { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #c9a96e; object-fit: cover; cursor: pointer; }
        .chat-header .info span { color: #c9a96e; font-weight: bold; letter-spacing: 2px; cursor: pointer; }
        .chat-header .gear-btn { color: #e0d5c1 !important; font-size: 1.3em !important; opacity: 0.7; }
        .dropdown { position: absolute; top: 100%; right: 10px; background: #16213e; border: 1px solid #3a3a5a; border-radius: 12px; padding: 6px 0; z-index: 50; min-width: 160px; }
        .dropdown button { display: block; width: 100%; padding: 10px 16px; background: none; border: none; color: #e0d5c1; font-family: inherit; font-size: 0.85em; letter-spacing: 2px; cursor: pointer; text-align: left; }
        .dropdown button:hover { background: rgba(201,169,110,0.15); color: #c9a96e; }

        .msg-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; gap: 8px; flex-shrink: 0; }
        .msg-row.me { flex-direction: row-reverse; }
        .msg-row img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #3a3a5a; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        .msg-row.me img { border-color: #4a7a5e; }
        .msg-row.bot img { border-color: #c9a96e; }
        .bubble { max-width: 70%; padding: 10px 14px; border-radius: 16px; font-size: 0.9em; line-height: 1.5; word-break: break-word; position: relative; }
        .msg-row.me .bubble { background: #e8a87c; color: #fff; }
        .msg-row.bot .bubble { background: #d6eaf8; color: #1a2a3a; }
        .bubble .tag { position: absolute; font-size: 12px; }
        .msg-row.me .tag { top: -12px; right: -4px; }
        .msg-row.bot .tag { top: -10px; left: -4px; }

        .input-area { display: flex; gap: 8px; padding: 10px 14px; background: rgba(22,33,62,0.95); flex-shrink: 0; }
        .input-area textarea { flex: 1; resize: none; background: rgba(15,15,26,0.8); border: 1px solid #3a3a5a; border-radius: 18px; padding: 10px 14px; color: #e0d5c1; font-family: inherit; font-size: 0.9em; outline: none; max-height: 90px; min-height: 40px; line-height: 1.4; }
        .input-area textarea:focus { border-color: #c9a96e; }
        .input-area .send-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #c9a96e; color: #1a1a2e; font-size: 1.1em; cursor: pointer; flex-shrink: 0; }
        .input-area .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #oracleScreen { flex: 1; display: flex; flex-direction: column; background: #0f0f1a; }
        .oracle-header { display: flex; align-items: center; justify-content: center; padding: 18px; background: #16213e; color: #c9a96e; letter-spacing: 4px; position: relative; flex-shrink: 0; }
        .oracle-header button { position: absolute; left: 12px; background: none; border: none; color: #c9a96e; font-size: 1.5em; cursor: pointer; }
        .ora-list { flex: 1; overflow-y: auto; padding: 24px 18px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .ora-card { background: #16213e; border: 1px solid #3a3a5a; border-radius: 14px; padding: 18px 22px; width: 100%; max-width: 400px; text-align: center; letter-spacing: 2px; line-height: 1.8; }

        #letterScreen { flex: 1; display: flex; flex-direction: column; background: #e8f5e9; background-size: cover; background-position: center; }
        .letter-header { display: flex; align-items: center; justify-content: center; padding: 14px; background: rgba(22,33,62,0.95); color: #c9a96e; letter-spacing: 3px; position: relative; flex-shrink: 0; }
        .letter-header button { position: absolute; left: 12px; background: none; border: none; color: #c9a96e; font-size: 1.5em; cursor: pointer; }
        .letter-header .lgear { position: absolute; right: 12px; left: auto; color: #e0d5c1; font-size: 1.3em; opacity: 0.7; cursor: pointer; background: none; border: none; }
        .let-tabs { display: flex; background: rgba(255,255,255,0.5); flex-shrink: 0; }
        .let-tabs button { flex: 1; padding: 12px; cursor: pointer; border: none; border-bottom: 2px solid transparent; color: rgba(0,0,0,0.5); font-family: inherit; font-size: 0.9em; background: none; }
        .let-tabs button.on { color: #c9a96e; border-bottom-color: #c9a96e; }
        .write-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .write-panel textarea { flex: 1; background: transparent; border: none; padding: 20px; color: #2a2a2a; font-family: inherit; font-size: 0.9em; line-height: 1.7; resize: none; outline: none; }
        .write-panel .lbtn { margin: 12px 20px; padding: 12px; border: 1px solid #c9a96e; background: transparent; color: #c9a96e; font-family: inherit; letter-spacing: 3px; cursor: pointer; border-radius: 50px; flex-shrink: 0; }
        .write-panel .lbtn:disabled { opacity: 0.4; cursor: not-allowed; }
        .reply-panel { flex: 1; overflow-y: auto; padding: 20px; color: #2a2a2a; font-size: 0.9em; line-height: 1.8; }

        .modal-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #16213e; border-radius: 18px; padding: 22px; width: 90%; max-width: 380px; text-align: center; }
        .modal-box h3 { color: #c9a96e; margin-bottom: 14px; }
        .modal-box input { width: 100%; padding: 10px; background: #0f0f1a; border: 1px solid #3a3a5a; border-radius: 10px; color: #e0d5c1; font-family: inherit; font-size: 0.9em; outline: none; margin-bottom: 14px; }
        .modal-box .acts { display: flex; gap: 10px; justify-content: center; }
        .modal-box .acts button { padding: 10px 22px; border-radius: 50px; cursor: pointer; font-family: inherit; }
        .modal-box .acts .ok { background: #c9a96e; color: #1a1a2e; border: none; }
        .modal-box .acts .no { background: transparent; border: 1px solid #3a3a5a; color: #e0d5c1; }

        .crop-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 200; display: flex; flex-direction: column; }
        .crop-area { flex: 1; position: relative; overflow: hidden; cursor: grab; }
        .crop-area img { position: absolute; top: 0; left: 0; transform-origin: 0 0; max-width: none; max-height: none; }
        .crop-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 0 9999px rgba(0,0,0,0.55); border: 2px dashed rgba(255,255,255,0.5); z-index: 10; pointer-events: none; }
        .crop-bar { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 14px; background: rgba(0,0,0,0.85); flex-shrink: 0; }
        .crop-bar button { padding: 10px 24px; border-radius: 50px; cursor: pointer; font-family: inherit; border: none; }
        .crop-bar .ok { background: #c9a96e; color: #1a1a2e; }
        .crop-bar .no { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
        .crop-bar input[type=range] { width: 100px; accent-color: #c9a96e; }
    </style>
</head>
<body>

<div class="app">
    <div id="startScreen">
        <div class="star">✦</div>
        <h1>塔 罗 传 讯</h1>
        <p>命运的信使 · 为你而来</p>
        <button class="btn1" id="btnChat">💬 聊 天</button>
        <button class="btn2" id="btnOracle">🔮 今日传讯</button>
        <button class="btn1" id="btnLetter">✉️ 书 信</button>
        <div class="sync-status" id="syncStatus"></div>
    </div>

    <div id="chatScreen" class="hidden">
        <div class="chat-header">
            <button id="chatBack">←</button>
            <div class="info">
                <img id="botAv" src="data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' fill='%232a2a4a'/%3E%3Ctext x='50' y='50' text-anchor='middle' dy='.35em' font-size='50' fill='%23c9a96e'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">
                <span id="botName">塔罗信使</span>
            </div>
            <button class="gear-btn" id="chatGear">⚙</button>
            <div id="chatMenu" class="dropdown hidden">
                <button id="menuMyNick">修改我的昵称</button>
                <button id="menuMyAvatar">更换我的头像</button>
                <button id="menuBotAvatar">更换对方头像</button>
                <button id="menuBotNick">修改对方昵称</button>
                <button id="menuChatBg">更换聊天背景</button>
            </div>
        </div>
        <div class="msg-list" id="msgList"></div>
        <div class="input-area">
            <textarea id="msgInput" rows="1" placeholder="写下你想说的话..."></textarea>
            <button class="send-btn" id="msgSend">↑</button>
        </div>
    </div>

    <div id="oracleScreen" class="hidden">
        <div class="oracle-header"><button id="oracleBack">←</button>🔮 今日传讯</div>
        <div class="ora-list" id="oraList"></div>
        <div style="text-align:center;padding:12px;flex-shrink:0;">
            <button id="oraRefresh" style="padding:10px 22px;border:1px solid #c9a96e;background:transparent;color:#c9a96e;font-family:inherit;cursor:pointer;border-radius:50px;">🔄 重新抽取</button>
        </div>
    </div>

    <div id="letterScreen" class="hidden">
        <div class="letter-header">
            <button id="letterBack">←</button>✉️ 书信
            <button class="lgear" id="letterGear">⚙</button>
            <div id="letterMenu" class="dropdown hidden" style="right:10px;">
                <button id="menuLetterBg">更换书信背景</button>
            </div>
        </div>
        <div class="let-tabs">
            <button class="on" id="tabWrite">📝 写 信</button>
            <button id="tabReply">📬 回 信</button>
        </div>
        <div class="write-panel" id="writePanel">
            <textarea id="letterInput" placeholder="写下你想说的话..."></textarea>
            <button class="lbtn" id="letterSend">📮 寄出信件</button>
        </div>
        <div class="reply-panel hidden" id="replyPanel"></div>
    </div>
</div>

<div id="nickModal" class="modal-over hidden">
    <div class="modal-box">
        <h3 id="nickTitle">修改昵称</h3>
        <input id="nickInput" maxlength="12" placeholder="输入新昵称...">
        <div class="acts">
            <button class="no" id="nickCancel">取消</button>
            <button class="ok" id="nickOk">确定</button>
        </div>
    </div>
</div>

<div id="cropModal" class="crop-over hidden">
    <div class="crop-area" id="cropArea">
        <img id="cropImg" src="" draggable="false">
        <div class="crop-ring" id="cropRing"></div>
    </div>
    <div class="crop-bar">
        <button class="no" id="cropCancel">取消</button>
        <input type="range" id="cropSlider" min="0.1" max="5" step="0.01" value="1">
        <button class="ok" id="cropOk">确定</button>
    </div>
</div>

<input type="file" id="filePicker" accept="image/*" style="display:none">

<script>
window.onload = function() {

    var SUPABASE_URL = 'https://omaiiaeolvyefvoetqty.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tYWlpYWVvbHZ5ZWZ2b2V0cXR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTk3NDUsImV4cCI6MjA5OTc3NTc0NX0.27MKF5VHWL3fn1fGvxLXpUtI9MTJMj3-5NLRpm3FJqY';

    // 用localStorage保存用户ID（关闭网页不丢失）
    var uid = '';
    try { uid = localStorage.getItem('tarot_uid'); } catch(e) {}
    if (!uid) { uid = 'u' + Date.now(); try { localStorage.setItem('tarot_uid', uid); } catch(e) {} }
    console.log('User ID:', uid);

    function cloudSave(data) {
        var xhr = new XMLHttpRequest();
        xhr.open('POST', SUPABASE_URL + '/rest/v1/user_data', true);
        xhr.setRequestHeader('apikey', SUPABASE_KEY);
        xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);

        xhr.setRequestHeader('Prefer', 'resolution=merge-duplicates');

        xhr.setRequestHeader('apikey', SUPABASE_KEY);
        xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
        xhr.onload = function() {
            if (xhr.status === 200) {
                try { var d = JSON.parse(xhr.responseText); if (d && d.length > 0 && d[0].data) { cb(d[0].data); return; } } catch(e) {}
            }
            cb(null);
        };
        xhr.onerror = function() { cb(null); };
        xhr.send();
    }

    var TAROT = {
        fool:["我刚刚跑回来找你了","我今天什么都不想管","先开心再说","别问问就是临时起意","我刚刚想到你就来了","今天有点想乱来","计划赶不上我想你","我决定不讲道理一天","你猜我下一秒会干什么","我现在心情不错你快夸我"],
        magician:["我今天帅不帅","你发现我刚刚的小动作了吗","我是故意的","看不出来吧我计划很久了","我觉得我刚刚特别厉害","你有没有被我迷到","我刚刚又成功了一件事","今天想炫耀一下自己","你快配合我一下","夸我不接受反驳"],
        empress:["今天有没有好好吃饭","你是不是又忘喝水了","别熬夜","我不在的时候也要照顾自己","最近是不是有点累","来靠过来一点","今天想惯着你","我刚刚还在担心你","你怎么总让人操心","给你一个抱抱"],
        lovers:["你今天想我了吗","我刚刚又来看你了","我在等你","你怎么才来","今天有点想黏你","我刚刚差点找你","你在干嘛呢","我现在想和你聊天","今天离我近一点","我有点想你"],
        star:["我刚刚许了个愿","希望能实现吧","今天突然有点期待","我觉得会变好的","好像有好事发生","我有点盼头了","今天想得很远","未来好像没那么糟","我突然很期待见你","想把好运分你一点"],
        sun:["我今天心情很好","快夸我","刚刚笑了一下","今天运气不错","我想炫耀一下","突然很开心","有个好消息","我今天状态不错","你来得刚好","我想和你分享"],
        moon:["我今天想很多","刚刚发了会呆","脑子有点乱","先让我安静会儿","有点说不清","今天不太想解释","我在想事情","刚刚想到你了","有点复杂","晚点告诉你"],
        world:["回来啦","今天很平静","我没走","没什么特别的事","只是来看看你","这样就很好","我喜欢现在这样","你不用总找我","我还在这里","今天也陪着你"]
    };
    function getAllMsgs(){var a=[];for(var k in TAROT){var arr=TAROT[k];for(var i=0;i<arr.length;i++){a.push({text:arr[i],card:k});}}return a;}
    function shuffle(a){var t=[];for(var i=0;i<a.length;i++)t.push(a[i]);for(var i=t.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=t[i];t[i]=t[j];t[j]=tmp;}return t;}
    var COLORS=['#e8a87c','#f4b8c1','#a8d8b9','#f9c74f','#c9b1d7','#f7a8b8','#a8d5e2','#e6c3a0','#b8d4a8','#f0c8a0'];
    function rc(){return COLORS[Math.floor(Math.random()*COLORS.length)];}
    function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3000);}
    var DMY='data:image/svg+xml,'+encodeURIComponent('<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#2d4a3e"/><text x="50" y="50" text-anchor="middle" dy=".35em" font-size="45" fill="#a8d5a2">👤</text></svg>');

    var S={myName:'我',botName:'塔罗信使',myAvatar:null,botAvatar:null,chatBg:null,letterBg:null,chatHistory:[],used:[],typing:false,oracle:[],letterText:'',replies:[],replyTime:null,nickWho:null,cropWhat:null,cropScale:1,cropX:0,cropY:0,cropNW:0,cropNH:0,dragging:false};
    function avatarFor(w){return w==='me'?(S.myAvatar||DMY):(S.botAvatar||document.getElementById('botAv').src);}
    
    function saveData(){
        var d={myName:S.myName,botName:S.botName,myAvatar:S.myAvatar,botAvatar:S.botAvatar,chatBg:S.chatBg,letterBg:S.letterBg,chatHistory:S.chatHistory.slice(-200),oracle:S.oracle,replies:S.replies,letterText:S.letterText,replyTime:S.replyTime};
        cloudSave(d);
    }

    var startScreen=document.getElementById('startScreen'),chatScreen=document.getElementById('chatScreen'),oracleScreen=document.getElementById('oracleScreen'),letterScreen=document.getElementById('letterScreen');
    var msgList=document.getElementById('msgList'),msgInput=document.getElementById('msgInput'),msgSend=document.getElementById('msgSend');
    var botAv=document.getElementById('botAv'),botNameEl=document.getElementById('botName');
    var chatMenu=document.getElementById('chatMenu'),letterMenu=document.getElementById('letterMenu');
    var oraList=document.getElementById('oraList'),letterInput=document.getElementById('letterInput'),letterSendBtn=document.getElementById('letterSend');
    var replyPanel=document.getElementById('replyPanel'),writePanel=document.getElementById('writePanel');
    var nickModal=document.getElementById('nickModal'),cropModal=document.getElementById('cropModal');

    function showPage(n){
        startScreen.classList.add('hidden');chatScreen.classList.add('hidden');oracleScreen.classList.add('hidden');letterScreen.classList.add('hidden');
        if(n==='start')startScreen.classList.remove('hidden');
        else if(n==='chat'){chatScreen.classList.remove('hidden');botNameEl.textContent=S.botName;if(S.botAvatar)botAv.src=S.botAvatar;chatScreen.style.backgroundImage=S.chatBg?'url('+S.chatBg+')':'';renderHistory();}
        else if(n==='oracle'){oracleScreen.classList.remove('hidden');if(!S.oracle.length)refreshOracle();renderOracle();}
        else if(n==='letter'){letterScreen.classList.remove('hidden');updateLetterUI();}
    }
    function renderHistory(){
        msgList.innerHTML='';var d=document.createElement('div');d.style.cssText='text-align:center;font-size:0.75em;color:rgba(0,0,0,0.35);padding:6px 0;';d.textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});msgList.appendChild(d);
        for(var i=0;i<S.chatHistory.length;i++){var m=S.chatHistory[i];addBubble(m.who,m.text,m.color);}
    }
    function addBubble(who,text,color){
        var row=document.createElement('div');row.className='msg-row '+(who==='me'?'me':'bot');var av=document.createElement('img');av.src=avatarFor(who);av.onclick=function(){triggerCrop(who==='me'?'myAvatar':'botAvatar');};
        var bub=document.createElement('div');bub.className='bubble';bub.textContent=text;var tag=document.createElement('span');tag.className='tag';tag.textContent=who==='me'?'🐈‍⬛':'❄️';bub.appendChild(tag);
        if(who==='me')bub.style.backgroundColor=color||rc();row.appendChild(av);row.appendChild(bub);msgList.appendChild(row);msgList.scrollTop=msgList.scrollHeight;
    }
    function sendMsg(){
        if(S.typing)return;var text=msgInput.value.trim();if(!text)return;msgInput.value='';msgInput.style.height='auto';msgSend.disabled=true;
        var color=rc();S.chatHistory.push({who:'me',text:text,time:Date.now(),color:color});addBubble('me',text,color);saveData();
        S.typing=true;var tr=document.createElement('div');tr.className='msg-row bot';tr.id='typing';tr.innerHTML='<img src="'+avatarFor('bot')+'"><div class="bubble" style="font-style:italic;opacity:0.7;">...<span class="tag">❄️</span></div>';msgList.appendChild(tr);msgList.scrollTop=msgList.scrollHeight;
        var n=Math.floor(Math.random()*3)+1,all=getAllMsgs(),avail=[];for(var i=0;i<all.length;i++){if(S.used.indexOf(i)===-1)avail.push(all[i]);}if(avail.length<n){S.used=[];for(var i=0;i<all.length;i++)avail.push(all[i]);}
        var picked=shuffle(avail).slice(0,n);for(var i=0;i<picked.length;i++){var idx=all.indexOf(picked[i]);if(idx>=0&&S.used.indexOf(idx)===-1)S.used.push(idx);}
        setTimeout(function(){var t=document.getElementById('typing');if(t)t.remove();for(var i=0;i<picked.length;i++){(function(msg,idx){setTimeout(function(){var txt=msg.text;if(Math.random()<0.35)txt+='，'+S.myName;S.chatHistory.push({who:'bot',text:txt,time:Date.now()});addBubble('bot',txt);saveData();if(idx===picked.length-1){S.typing=false;msgSend.disabled=false;msgInput.focus();}},idx*1000);})(picked[i],i);}if(!picked.length){S.typing=false;msgSend.disabled=false;}},Math.floor(Math.random()*3000)+1000);
    }

    function refreshOracle(){S.oracle=shuffle(getAllMsgs()).slice(0,Math.floor(Math.random()*3)+3).map(function(m){return{text:m.text};});saveData();renderOracle();}
    function renderOracle(){oraList.innerHTML='';if(!S.oracle.length){oraList.innerHTML='<div style="text-align:center;color:rgba(224,213,193,0.4);padding:60px;">点击下方按钮<br>抽取今日传讯 ✨</div>';return;}for(var i=0;i<S.oracle.length;i++){var c=document.createElement('div');c.className='ora-card';c.textContent=S.oracle[i].text;oraList.appendChild(c);}}
    
    function switchLetterTab(tab){document.getElementById('tabWrite').className=tab==='write'?'on':'';document.getElementById('tabReply').className=tab==='reply'?'on':'';writePanel.classList.toggle('hidden',tab!=='write');replyPanel.classList.toggle('hidden',tab!=='reply');updateLetterUI();}
    function updateLetterUI(){
        if(writePanel.classList.contains('hidden')){if(S.replyTime&&S.replyTime>Date.now()){var m=Math.ceil((S.replyTime-Date.now())/60000);var ts=m<60?m+'分钟':Math.floor(m/60)+'小时'+m%60+'分钟';replyPanel.innerHTML='<div style="text-align:center;color:rgba(0,0,0,0.5);padding:40px;">📬 信件已寄出<br><br>预计 '+ts+' 后回复</div>';}else if(!S.replies||!S.replies.length){replyPanel.innerHTML='<div style="text-align:center;color:rgba(0,0,0,0.4);padding:40px;">还没有收到回信<br>先去写信吧 ✍️</div>';}else{var h='';for(var i=0;i<S.replies.length;i++){h+='<div style="padding:5px 0;border-bottom:1px dotted rgba(0,0,0,0.07);">'+S.replies[i].text+'</div>';}replyPanel.innerHTML=h;}}else{letterInput.value=S.letterText||'';letterSendBtn.disabled=!!(S.replyTime&&S.replyTime>Date.now());letterSendBtn.textContent=S.replyTime&&S.replyTime>Date.now()?'⏳ 等待回信中...':'📮 寄出信件';}
    }
    function submitLetter(){var t=letterInput.value.trim();if(!t||(S.replyTime&&S.replyTime>Date.now()))return;S.letterText=t;S.replies=[];S.replyTime=null;var d=Math.floor(Math.random()*(10800000-600000+1))+600000;S.replyTime=Date.now()+d;S.replyTimer=setTimeout(function(){S.replies=shuffle(getAllMsgs()).slice(0,Math.max(5,Math.floor(Math.random()*3)+5)).map(function(m){return{text:m.text};});S.replyTime=null;saveData();updateLetterUI();},d);saveData();letterInput.value='';S.letterText='';switchLetterTab('reply');}

    function changeNick(w){S.nickWho=w;document.getElementById('nickTitle').textContent=w==='me'?'修改你的昵称':'修改对方昵称';document.getElementById('nickInput').value=w==='me'?S.myName:S.botName;nickModal.classList.remove('hidden');document.getElementById('nickInput').focus();}
    document.getElementById('nickCancel').onclick=function(){nickModal.classList.add('hidden');};
    document.getElementById('nickOk').onclick=function(){var v=document.getElementById('nickInput').value.trim();if(!v)return;if(S.nickWho==='me')S.myName=v;else{S.botName=v;botNameEl.textContent=v;}nickModal.classList.add('hidden');saveData();toast('✅ 昵称已更新');};
    nickModal.onclick=function(e){if(e.target===nickModal)nickModal.classList.add('hidden');};

    function triggerCrop(w){S.cropWhat=w;document.getElementById('filePicker').click();}
    document.getElementById('filePicker').onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){S.cropScale=1;S.cropX=0;S.cropY=0;showCrop(ev.target.result);};r.readAsDataURL(f);e.target.value='';};
    function showCrop(src){var img=document.getElementById('cropImg');img.src=src;img.onload=function(){S.cropNW=img.naturalWidth;S.cropNH=img.naturalHeight;var a=document.getElementById('cropArea'),aw=a.clientWidth,ah=a.clientHeight;S.cropScale=Math.max(aw/S.cropNW,ah/S.cropNH)*0.8;S.cropX=(aw-S.cropNW*S.cropScale)/2;S.cropY=(ah-S.cropNH*S.cropScale)/2;document.getElementById('cropSlider').value=S.cropScale;applyCrop();};img.style.transformOrigin='0 0';document.getElementById('cropSlider').value=1;cropModal.classList.remove('hidden');updateCropRing();}
    function updateCropRing(){var a=document.getElementById('cropArea'),aw=a.clientWidth,ah=a.clientHeight,bg=S.cropWhat==='chatBg'||S.cropWhat==='letterBg',r=document.getElementById('cropRing');r.style.borderRadius=bg?'8px':'50%';r.style.width=(bg?aw*0.85:Math.min(aw,ah)*0.55)+'px';r.style.height=(bg?ah*0.7:Math.min(aw,ah)*0.55)+'px';}
    function applyCrop(){document.getElementById('cropImg').style.transform='translate('+S.cropX+'px,'+S.cropY+'px) scale('+S.cropScale+')';}
    document.getElementById('cropCancel').onclick=function(){cropModal.classList.add('hidden');S.cropWhat=null;};
    document.getElementById('cropOk').onclick=function(){var img=document.getElementById('cropImg'),ring=document.getElementById('cropRing'),area=document.getElementById('cropArea'),rr=ring.getBoundingClientRect(),ar=area.getBoundingClientRect(),fw=rr.width,fh=rr.height,c=document.createElement('canvas');c.width=fw;c.height=fh;var ctx=c.getContext('2d');ctx.drawImage(img,((rr.left-ar.left)-S.cropX)/S.cropScale,((rr.top-ar.top)-S.cropY)/S.cropScale,fw/S.cropScale,fh/S.cropScale,0,0,fw,fh);var url;if(S.cropWhat==='myAvatar'||S.cropWhat==='botAvatar'){var rc=document.createElement('canvas');rc.width=200;rc.height=200;var rctx=rc.getContext('2d');rctx.beginPath();rctx.arc(100,100,100,0,Math.PI*2);rctx.clip();rctx.drawImage(c,0,0,fw,fh,0,0,200,200);url=rc.toDataURL('image/png');}else{url=c.toDataURL('image/jpeg',0.85);}if(S.cropWhat==='myAvatar')S.myAvatar=url;else if(S.cropWhat==='botAvatar'){S.botAvatar=url;botAv.src=url;}else if(S.cropWhat==='chatBg'){S.chatBg=url;chatScreen.style.backgroundImage='url('+url+')';}else if(S.cropWhat==='letterBg'){S.letterBg=url;letterScreen.style.backgroundImage='url('+url+')';letterScreen.style.backgroundSize='cover';letterScreen.style.backgroundPosition='center';}cropModal.classList.add('hidden');S.cropWhat=null;saveData();toast('✅ 已保存');};
    document.getElementById('cropSlider').oninput=function(){S.cropScale=parseFloat(this.value);applyCrop();};
    var ca=document.getElementById('cropArea');ca.addEventListener('mousedown',function(e){S.dragging=true;S.dsX=e.clientX;S.dsY=e.clientY;S.dsCX=S.cropX;S.dsCY=S.cropY;e.preventDefault();});ca.addEventListener('touchstart',function(e){if(e.touches.length===1){S.dragging=true;S.dsX=e.touches[0].clientX;S.dsY=e.touches[0].clientY;S.dsCX=S.cropX;S.dsCY=S.cropY;}},{passive:false});ca.addEventListener('wheel',function(e){e.preventDefault();S.cropScale=Math.max(0.1,Math.min(5,S.cropScale+(e.deltaY>0?-0.03:0.03)));document.getElementById('cropSlider').value=S.cropScale;applyCrop();},{passive:false});document.addEventListener('mousemove',function(e){if(!S.dragging)return;S.cropX=S.dsCX+(e.clientX-S.dsX);S.cropY=S.dsCY+(e.clientY-S.dsY);applyCrop();});document.addEventListener('mouseup',function(){S.dragging=false;});document.addEventListener('touchmove',function(e){if(!S.dragging)return;S.cropX=S.dsCX+(e.touches[0].clientX-S.dsX);S.cropY=S.dsCY+(e.touches[0].clientY-S.dsY);applyCrop();});document.addEventListener('touchend',function(){S.dragging=false;});

    document.getElementById('btnChat').onclick=function(){showPage('chat');};
    document.getElementById('btnOracle').onclick=function(){showPage('oracle');};
    document.getElementById('btnLetter').onclick=function(){showPage('letter');};
    document.getElementById('chatBack').onclick=function(){showPage('start');};
    document.getElementById('oracleBack').onclick=function(){showPage('start');};
    document.getElementById('letterBack').onclick=function(){showPage('start');};
    document.getElementById('oraRefresh').onclick=refreshOracle;
    document.getElementById('chatGear').onclick=function(e){e.stopPropagation();chatMenu.classList.toggle('hidden');};
    document.getElementById('menuMyNick').onclick=function(){changeNick('me');chatMenu.classList.add('hidden');};
    document.getElementById('menuMyAvatar').onclick=function(){triggerCrop('myAvatar');chatMenu.classList.add('hidden');};
    document.getElementById('menuBotAvatar').onclick=function(){triggerCrop('botAvatar');chatMenu.classList.add('hidden');};
    document.getElementById('menuBotNick').onclick=function(){changeNick('bot');chatMenu.classList.add('hidden');};
    document.getElementById('menuChatBg').onclick=function(){triggerCrop('chatBg');chatMenu.classList.add('hidden');};
    botAv.onclick=function(){triggerCrop('botAvatar');};botNameEl.onclick=function(){changeNick('bot');};
    document.getElementById('letterGear').onclick=function(e){e.stopPropagation();letterMenu.classList.toggle('hidden');};
    document.getElementById('menuLetterBg').onclick=function(){triggerCrop('letterBg');letterMenu.classList.add('hidden');};
    document.getElementById('tabWrite').onclick=function(){switchLetterTab('write');};
    document.getElementById('tabReply').onclick=function(){switchLetterTab('reply');};
    letterSendBtn.onclick=submitLetter;
    msgSend.onclick=sendMsg;
    msgInput.onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}};
    msgInput.oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px';};
    document.addEventListener('click',function(e){if(!e.target.closest('.dropdown')&&!e.target.closest('.gear-btn')&&!e.target.closest('.lgear')){chatMenu.classList.add('hidden');letterMenu.classList.add('hidden');}});

    // 初始化：从云端加载
    cloudLoad(function(data){
        if(data){if(data.chatHistory)S.chatHistory=data.chatHistory;if(data.chatBg)S.chatBg=data.chatBg;if(data.myName)S.myName=data.myName;if(data.botName)S.botName=data.botName;if(data.myAvatar)S.myAvatar=data.myAvatar;if(data.botAvatar)S.botAvatar=data.botAvatar;if(data.letterBg)S.letterBg=data.letterBg;if(data.oracle)S.oracle=data.oracle;if(data.replies)S.replies=data.replies;if(data.letterText!=null)S.letterText=data.letterText;if(data.replyTime!=null)S.replyTime=data.replyTime;}
        if(S.botAvatar)botAv.src=S.botAvatar;botNameEl.textContent=S.botName;
        if(S.chatBg)chatScreen.style.backgroundImage='url('+S.chatBg+')';
        if(S.letterBg){letterScreen.style.backgroundImage='url('+S.letterBg+')';letterScreen.style.backgroundSize='cover';letterScreen.style.backgroundPosition='center';}
        if(S.replyTime&&S.replyTime>Date.now()){setTimeout(function(){S.replies=shuffle(getAllMsgs()).slice(0,Math.max(5,Math.floor(Math.random()*3)+5)).map(function(m){return{text:m.text};});S.replyTime=null;saveData();updateLetterUI();},S.replyTime-Date.now());}
        document.getElementById('syncStatus').textContent=S.chatHistory.length>0?'✅ 已加载 '+S.chatHistory.length+' 条记录':'✅ 已连接云端';
        document.getElementById('syncStatus').style.color='#4a9e4a';
        showPage('start');
    });
};
</script>
</body>
